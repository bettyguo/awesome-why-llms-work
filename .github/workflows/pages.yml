name: pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "programmes/**"
      - "scripts/extract_ledger_json.py"
      - "scripts/render_taxonomy.py"
      - "scripts/render_hero.py"
      - "taxonomy.svg"
      - "hero.svg"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate ledger data
        run: |
          python scripts/extract_ledger_json.py

      - name: Regenerate diagrams (SVG only — PNG optional)
        run: |
          python scripts/render_taxonomy.py
          python scripts/render_hero.py

      - name: Assemble site root
        run: |
          # docs/ is already self-contained (it holds its own copies of
          # hero.* and taxonomy.*). We refresh those copies with the
          # just-regenerated SVGs so the deploy is always current, then
          # publish docs/ directly.
          cp taxonomy.svg docs/taxonomy.svg
          cp taxonomy.png docs/taxonomy.png 2>/dev/null || true
          cp hero.svg     docs/hero.svg
          cp hero.png     docs/hero.png     2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
