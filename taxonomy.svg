<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="Helvetica, Arial, sans-serif">
<rect width="1280" height="720" fill="#fbfbfb"/><text x="640" y="36" text-anchor="middle" font-size="22" font-weight="700">Why LLMs Work — Five Programmes Map</text>
<rect x="60" y="80" width="300" height="200" rx="14" ry="14" fill="white" stroke="#1f77b4" stroke-width="2.5"/>
<text x="72" y="102" font-size="13" font-weight="700" fill="#1f77b4">01 — Compression-as-Intelligence</text>
<rect x="60" y="320" width="300" height="200" rx="14" ry="14" fill="white" stroke="#2ca02c" stroke-width="2.5"/>
<text x="72" y="342" font-size="13" font-weight="700" fill="#2ca02c">02 — Superposition / LRH</text>
<rect x="520" y="80" width="300" height="200" rx="14" ry="14" fill="white" stroke="#d62728" stroke-width="2.5"/>
<text x="532" y="102" font-size="13" font-weight="700" fill="#d62728">03 — Circuits / Biology</text>
<rect x="520" y="320" width="300" height="200" rx="14" ry="14" fill="white" stroke="#9467bd" stroke-width="2.5"/>
<text x="532" y="342" font-size="13" font-weight="700" fill="#9467bd">04 — ICL as Bayes / Meta-learning</text>
<rect x="980" y="200" width="240" height="240" rx="14" ry="14" fill="white" stroke="#ff7f0e" stroke-width="2.5"/>
<text x="992" y="222" font-size="13" font-weight="700" fill="#ff7f0e">05 — Emergence (and Reasoning)</text>
<text x="78" y="110" font-size="11" fill="#222"><tspan>🟡</tspan> bpb ≈ linear in benchmark</text>
<text x="78" y="150" font-size="11" fill="#222"><tspan>🟢</tspan> LMs are lossless compressors</text>
<text x="78" y="190" font-size="11" fill="#222"><tspan>⚪</tspan> Hutter / Solomonoff anchor</text>
<text x="78" y="350" font-size="11" fill="#222"><tspan>🟢</tspan> n features into d&lt;n dimensions</text>
<text x="78" y="390" font-size="11" fill="#222"><tspan>🟢</tspan> features ≈ linear directions</text>
<text x="78" y="430" font-size="11" fill="#222"><tspan>⚪</tspan> cross-family universality</text>
<text x="538" y="110" font-size="11" fill="#222"><tspan>🟢</tspan> induction heads (universal)</text>
<text x="538" y="150" font-size="11" fill="#222"><tspan>🟢</tspan> IOI / circuit discovery</text>
<text x="538" y="190" font-size="11" fill="#222"><tspan>⚪</tspan> circuits explain OOD</text>
<text x="538" y="350" font-size="11" fill="#222"><tspan>🟢</tspan> ICL tracks Bayes-optimal (toy)</text>
<text x="538" y="390" font-size="11" fill="#222"><tspan>🟢</tspan> ICL = portfolio of algorithms</text>
<text x="538" y="430" font-size="11" fill="#222"><tspan>🟡</tspan> ICL Bayes-optimal on natural data</text>
<text x="538" y="470" font-size="11" fill="#222"><tspan>🔴</tspan> asymptotic-Bayes equilibrium</text>
<text x="998" y="230" font-size="11" fill="#222"><tspan>🔴</tspan> strong (Wei) emergence</text>
<text x="998" y="270" font-size="11" fill="#222"><tspan>🟢</tspan> metric-artifact (Schaeffer)</text>
<text x="998" y="310" font-size="11" fill="#222"><tspan>🟡</tspan> test-time-compute scaling</text>
<defs><marker id="arrow-support" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/></marker><marker id="arrow-tension" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b22222"/></marker></defs>
<line x1="210" y1="240" x2="210" y2="360" stroke="#444" stroke-width="2"  marker-end="url(#arrow-support)"/>
<text x="210" y="294" text-anchor="middle" font-size="10" fill="#444">implies (mechanism)</text>
<line x1="280" y1="393" x2="600" y2="207" stroke="#444" stroke-width="2"  marker-end="url(#arrow-support)"/>
<text x="440" y="294" text-anchor="middle" font-size="10" fill="#444">feature graph → circuit graph</text>
<line x1="670" y1="240" x2="670" y2="360" stroke="#444" stroke-width="2"  marker-end="url(#arrow-support)"/>
<text x="670" y="294" text-anchor="middle" font-size="10" fill="#444">induction head ↔ ICL</text>
<line x1="747" y1="407" x2="1023" y2="333" stroke="#b22222" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-tension)"/>
<text x="885" y="364" text-anchor="middle" font-size="10" fill="#b22222">transient ICL ↔ training-time emergence</text>
<line x1="289" y1="189" x2="1021" y2="311" stroke="#b22222" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-tension)"/>
<text x="655" y="244" text-anchor="middle" font-size="10" fill="#b22222">reasoning models reopen compression-capability gap</text>
<text x="60" y="680" font-size="11" fill="#444">🟢 supported · 🟡 contested · 🔴 refuted · ⚪ open</text><text x="60" y="698" font-size="11" fill="#444">solid arrow = supports / implies     dashed red arrow = in tension with</text>
</svg>