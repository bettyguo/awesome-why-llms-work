<text x="640" y="50" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a">Why LLMs Work — the Five Programmes Map</text>
<text x="640" y="78" text-anchor="middle" font-size="14" font-weight="400" fill="#475569">A falsifiable-hypothesis atlas of why large language models actually work. Status: 🟢 supported · 🟡 contested · 🔴 refuted · ⚪ open</text>
