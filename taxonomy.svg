<text x="800" y="44" text-anchor="middle" font-size="30" font-weight="800" fill="#0f172a">Why LLMs Work — the Five Programmes Map</text>
<text x="800" y="74" text-anchor="middle" font-size="15" font-weight="400" fill="#475569">A falsifiable-hypothesis atlas of why large language models actually work.</text>
