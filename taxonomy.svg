<text x="74" y="134" font-size="13.5" font-weight="700" fill="#ffffff">01 — Compression-as-Intelligence</text>
<text x="74" y="166" font-size="11" fill="#334155" font-style="italic">Capability ≈ linearly tracks bits-per-byte.</text>
<text x="74" y="190" font-size="11.5" fill="#0f172a"><tspan font-size="13">🟢</tspan><tspan dx="6">LMs are lossless compressors of text</tspan></text>
<text x="74" y="212" font-size="11.5" fill="#0f172a"><tspan font-size="13">🟡</tspan><tspan dx="6">bits-per-byte ≈ linear in benchmark</tspan></text>
<text x="74" y="234" font-size="11.5" fill="#0f172a"><tspan font-size="13">⚪</tspan><tspan dx="6">Hutter / Solomonoff philosophical anchor</tspan></text>
<rect x="60" y="320" width="350" height="180" rx="14" ry="14" fill="#ecfdf5" stroke="#059669" stroke-width="1.5" filter="url(#card-shadow)"/>
<path d="M60,334 a14,14 0 0 1 14,-14 h322 a14,14 0 0 1 14,14 v22 h-350 z" fill="url(#hdr-02)"/>
<text x="74" y="344" font-size="13.5" font-weight="700" fill="#ffffff">02 — Superposition &amp; Linear Representations</text>
<text x="74" y="376" font-size="11" fill="#334155" font-style="italic">Models pack n features into d&lt;n dims as linear directions.</text>
<text x="74" y="400" font-size="11.5" fill="#0f172a"><tspan font-size="13">🟢</tspan><tspan dx="6">Trained nets pack n features into d&lt;n dims</tspan></text>
<text x="74" y="422" font-size="11.5" fill="#0f172a"><tspan font-size="13">🟢</tspan><tspan dx="6">Features ≈ linear directions in activations</tspan></text>
<text x="74" y="444" font-size="11.5" fill="#0f172a"><tspan font-size="13">⚪</tspan><tspan dx="6">Cross-family feature universality</tspan></text>
<rect x="470" y="110" width="350" height="180" rx="14" ry="14" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#card-shadow)"/>
<path d="M470,124 a14,14 0 0 1 14,-14 h322 a14,14 0 0 1 14,14 v22 h-350 z" fill="url(#hdr-03)"/>
<text x="484" y="134" font-size="13.5" font-weight="700" fill="#ffffff">03 — Circuits &amp; the Biology of LLMs</text>
<text x="484" y="166" font-size="11" fill="#334155" font-style="italic">Small causally-validated sub-graphs implement behaviors.</text>
<text x="484" y="190" font-size="11.5" fill="#0f172a"><tspan font-size="13">🟢</tspan><tspan dx="6">Induction heads (universal motif)</tspan></text>
<text x="484" y="212" font-size="11.5" fill="#0f172a"><tspan font-size="13">🟢</tspan><tspan dx="6">IOI / circuit-discovery method</tspan></text>
<text x="484" y="234" font-size="11.5" fill="#0f172a"><tspan font-size="13">⚪</tspan><tspan dx="6">Circuits explain OOD behavior</tspan></text>
<rect x="470" y="320" width="350" height="180" rx="14" ry="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#card-shadow)"/>
<path d="M470,334 a14,14 0 0 1 14,-14 h322 a14,14 0 0 1 14,14 v22 h-350 z" fill="url(#hdr-04)"/>
<text x="484" y="344" font-size="13.5" font-weight="700" fill="#ffffff">04 — ICL as Implicit Bayes / Meta-Learning</text>
<text x="484" y="376" font-size="11" fill="#334155" font-style="italic">ICL ≈ Bayesian posterior over latent tasks.</text>
<text x="484" y="400" font-size="11.5" fill="#0f172a"><tspan font-size="13">🟢</tspan><tspan dx="6">ICL tracks Bayes-optimal (toy data)</tspan></text>
<text x="484" y="422" font-size="11.5" fill="#0f172a"><tspan font-size="13">🟢</tspan><tspan dx="6">ICL = portfolio of algorithms</tspan></text>
<text x="484" y="444" font-size="11.5" fill="#0f172a"><tspan font-size="13">🔴</tspan><tspan dx="6">Bayes-invariant to surface form</tspan></text>
<text x="484" y="466" font-size="11.5" fill="#0f172a"><tspan font-size="13">🔴</tspan><tspan dx="6">Asymptotic-Bayes equilibrium</tspan></text>
<rect x="880" y="215" width="340" height="290" rx="14" ry="14" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#card-shadow)"/>
<path d="M880,229 a14,14 0 0 1 14,-14 h312 a14,14 0 0 1 14,14 v22 h-340 z" fill="url(#hdr-05)"/>
<text x="894" y="239" font-size="13.5" font-weight="700" fill="#ffffff">05 — Emergence &amp; Reasoning</text>
<text x="894" y="271" font-size="11" fill="#334155" font-style="italic">Strong Wei-emergence 🔴; test-time-compute 🟡 alive.</text>
<text x="894" y="295" font-size="11.5" fill="#0f172a"><tspan font-size="13">🔴</tspan><tspan dx="6">Strong (Wei) emergence</tspan></text>
<text x="894" y="317" font-size="11.5" fill="#0f172a"><tspan font-size="13">🟢</tspan><tspan dx="6">Metric-artifact (Schaeffer)</tspan></text>
<text x="894" y="339" font-size="11.5" fill="#0f172a"><tspan font-size="13">🟡</tspan><tspan dx="6">Test-time-compute scaling axis</tspan></text>
<text x="894" y="361" font-size="11.5" fill="#0f172a"><tspan font-size="13">⚪</tspan><tspan dx="6">Strict complex-systems emergence</tspan></text>
