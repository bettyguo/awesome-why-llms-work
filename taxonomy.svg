<text x="76" y="186" font-size="15" font-weight="700" fill="#ffffff">01 — Compression-as-Intelligence</text>
<text x="76" y="222" font-size="12.5" fill="#334155" font-style="italic">Capability ≈ linearly tracks bits-per-byte.</text>
<circle cx="82" cy="248" r="6" fill="#16a34a" stroke="#16a34a" stroke-width="1.5"/>
<text x="96" y="252" font-size="13" fill="#0f172a">LMs are lossless compressors of text</text>
<circle cx="82" cy="274" r="6" fill="#eab308" stroke="#eab308" stroke-width="1.5"/>
<text x="96" y="278" font-size="13" fill="#0f172a">bits-per-byte ≈ linear in benchmark</text>
<circle cx="82" cy="300" r="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
<text x="96" y="304" font-size="13" fill="#0f172a">Hutter / Solomonoff anchor</text>
<rect x="60" y="500" width="400" height="240" rx="14" ry="14" fill="#ecfdf5" stroke="#059669" stroke-width="1.5" filter="url(#card-shadow)"/>
<path d="M60,514 a14,14 0 0 1 14,-14 h372 a14,14 0 0 1 14,14 v26 h-400 z" fill="url(#hdr-02)"/>
<text x="76" y="526" font-size="15" font-weight="700" fill="#ffffff">02 — Superposition &amp; Linear Representations</text>
<text x="76" y="562" font-size="12.5" fill="#334155" font-style="italic">Models pack n features into d&lt;n dims as linear directions.</text>
<circle cx="82" cy="588" r="6" fill="#16a34a" stroke="#16a34a" stroke-width="1.5"/>
<text x="96" y="592" font-size="13" fill="#0f172a">Trained nets pack n features into d&lt;n dims</text>
<circle cx="82" cy="614" r="6" fill="#16a34a" stroke="#16a34a" stroke-width="1.5"/>
<text x="96" y="618" font-size="13" fill="#0f172a">Features ≈ linear directions in activations</text>
<circle cx="82" cy="640" r="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
<text x="96" y="644" font-size="13" fill="#0f172a">Cross-family feature universality</text>
<rect x="530" y="160" width="400" height="240" rx="14" ry="14" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#card-shadow)"/>
<path d="M530,174 a14,14 0 0 1 14,-14 h372 a14,14 0 0 1 14,14 v26 h-400 z" fill="url(#hdr-03)"/>
<text x="546" y="186" font-size="15" font-weight="700" fill="#ffffff">03 — Circuits &amp; the Biology of LLMs</text>
<text x="546" y="222" font-size="12.5" fill="#334155" font-style="italic">Small causally-validated sub-graphs implement behaviors.</text>
<circle cx="552" cy="248" r="6" fill="#16a34a" stroke="#16a34a" stroke-width="1.5"/>
<text x="566" y="252" font-size="13" fill="#0f172a">Induction heads (universal motif)</text>
<circle cx="552" cy="274" r="6" fill="#16a34a" stroke="#16a34a" stroke-width="1.5"/>
<text x="566" y="278" font-size="13" fill="#0f172a">IOI / circuit-discovery method</text>
<circle cx="552" cy="300" r="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
<text x="566" y="304" font-size="13" fill="#0f172a">Circuits explain OOD behavior</text>
<rect x="530" y="500" width="400" height="240" rx="14" ry="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#card-shadow)"/>
<path d="M530,514 a14,14 0 0 1 14,-14 h372 a14,14 0 0 1 14,14 v26 h-400 z" fill="url(#hdr-04)"/>
<text x="546" y="526" font-size="15" font-weight="700" fill="#ffffff">04 — ICL as Implicit Bayes / Meta-Learning</text>
<text x="546" y="562" font-size="12.5" fill="#334155" font-style="italic">ICL ≈ Bayesian posterior over latent tasks.</text>
<circle cx="552" cy="588" r="6" fill="#16a34a" stroke="#16a34a" stroke-width="1.5"/>
<text x="566" y="592" font-size="13" fill="#0f172a">ICL tracks Bayes-optimal (toy data)</text>
<circle cx="552" cy="614" r="6" fill="#16a34a" stroke="#16a34a" stroke-width="1.5"/>
<text x="566" y="618" font-size="13" fill="#0f172a">ICL = portfolio of algorithms</text>
<circle cx="552" cy="640" r="6" fill="#dc2626" stroke="#dc2626" stroke-width="1.5"/>
<text x="566" y="644" font-size="13" fill="#0f172a">Bayes-invariant to surface form</text>
<circle cx="552" cy="666" r="6" fill="#dc2626" stroke="#dc2626" stroke-width="1.5"/>
<text x="566" y="670" font-size="13" fill="#0f172a">Asymptotic-Bayes equilibrium</text>
<rect x="1160" y="310" width="380" height="280" rx="14" ry="14" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#card-shadow)"/>
<path d="M1160,324 a14,14 0 0 1 14,-14 h352 a14,14 0 0 1 14,14 v26 h-380 z" fill="url(#hdr-05)"/>
<text x="1176" y="336" font-size="15" font-weight="700" fill="#ffffff">05 — Emergence &amp; Reasoning</text>
<text x="1176" y="372" font-size="12.5" fill="#334155" font-style="italic">Strong Wei-emergence refuted; test-time-compute alive.</text>
<circle cx="1182" cy="398" r="6" fill="#dc2626" stroke="#dc2626" stroke-width="1.5"/>
<text x="1196" y="402" font-size="13" fill="#0f172a">Strong (Wei) emergence</text>
<circle cx="1182" cy="424" r="6" fill="#16a34a" stroke="#16a34a" stroke-width="1.5"/>
